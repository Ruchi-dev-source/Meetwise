<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login - MeetWise AI</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#050505",
                        surface: "#0a0a0c",
                        "surface-card": "rgba(13, 13, 17, 0.45)",
                        primary: "#8B5CF6", // purple
                        secondary: "#3B82F6", // blue
                        accent: "#06B6D4", // cyan
                        pinky: "#EC4899", // pink
                        "on-background": "#F3F4F6",
                        "on-surface": "#E5E7EB",
                        outline: "rgba(255, 255, 255, 0.05)",
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        lg: "0.75rem",
                        xl: "1rem",
                        "2xl": "1.5rem",
                        full: "9999px"
                    },
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                        display: ["Space Grotesk", "sans-serif"],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050505;
            color: #F3F4F6;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .cosmic-grid {
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        .glass-panel {
            background: rgba(13, 13, 17, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.12; transform: scale(1); }
            50% { opacity: 0.18; transform: scale(1.05); }
        }
        .animate-pulse-slow {
            animation: pulse-slow 8s ease-in-out infinite;
        }
    </style>
</head>
<body class="min-h-screen relative flex items-center justify-center antialiased">
    <!-- Cosmic background overlay -->
    <div class="absolute inset-0 cosmic-grid pointer-events-none z-0"></div>

    <!-- Glowing blurred orbs -->
    <div class="gradient-orb w-[500px] h-[500px] bg-primary top-[-10%] left-[-10%] animate-pulse-slow" style="animation-delay: 0s;"></div>
    <div class="gradient-orb w-[600px] h-[600px] bg-secondary bottom-[-10%] right-[-10%] animate-pulse-slow" style="animation-delay: 3s;"></div>
    <div class="gradient-orb w-[400px] h-[400px] bg-pinky top-[30%] right-[20%] opacity-10 animate-pulse-slow" style="animation-delay: 5s;"></div>

    <!-- Login Container -->
    <div class="w-full max-w-[460px] px-6 z-10">
        <div class="glass-panel rounded-2xl p-8 md:p-10 relative overflow-hidden">
            <!-- Brand Logo / Back to home link -->
            <a href="../meetwise_ai_features/code.html" class="flex flex-col items-center mb-8 group">
                <div class="h-12 w-12 rounded-xl bg-gradient-to-tr from-primary via-secondary to-pinky flex items-center justify-center mb-4 shadow-lg shadow-primary/20 group-hover:scale-105 transition-transform duration-300">
                    <i data-lucide="sparkles" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="font-display text-2xl font-bold tracking-tight text-white">MeetWise AI</h1>
                <p class="text-xs text-gray-400 mt-2 text-center">Welcome back. Enter your workspace details.</p>
            </a>

            <!-- Form -->
            <form id="login-form" action="#" class="space-y-5" onsubmit="handleLoginSubmit(event)">
                <!-- Email Input -->
                <div class="space-y-1.5">
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400" for="email">Work Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-500">
                            <i data-lucide="mail" class="w-4 h-4"></i>
                        </div>
                        <input class="block w-full pl-10 pr-4 py-3 border border-white/5 rounded-xl bg-white/5 focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all text-sm text-white placeholder:text-gray-500" id="email" name="email" placeholder="name@company.com" required type="email"/>
                    </div>
                </div>

                <!-- Password Input -->
                <div class="space-y-1.5">
                    <div class="flex items-center justify-between">
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400" for="password">Password</label>
                        <a class="text-xs text-primary hover:text-pinky transition-colors font-medium" href="#">Forgot?</a>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-500">
                            <i data-lucide="lock" class="w-4 h-4"></i>
                        </div>
                        <input class="block w-full pl-10 pr-10 py-3 border border-white/5 rounded-xl bg-white/5 focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all text-sm text-white placeholder:text-gray-500" id="password" name="password" placeholder="••••••••" required type="password"/>
                        <button type="button" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-gray-500 hover:text-gray-300 transition-colors" onclick="togglePasswordVisibility()">
                            <i id="visibility-icon" data-lucide="eye" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center pt-1">
                    <input class="h-4 w-4 rounded border-white/10 text-primary bg-white/5 focus:ring-0 focus:ring-offset-0 cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
                    <label class="ml-2 block text-xs text-gray-400 cursor-pointer" for="remember-me">
                        Remember workspace session for 30 days
                    </label>
                </div>

                <!-- Submit Button -->
                <div class="pt-2">
                    <button class="w-full py-3 px-4 rounded-xl bg-gradient-to-r from-primary via-secondary to-pinky hover:shadow-lg hover:shadow-primary/30 transition-all text-white font-semibold text-sm hover:scale-[1.02] active:scale-[0.98] duration-200 shadow-md flex items-center justify-center gap-2" type="submit">
                        Launch Workspace <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                </div>
            </form>

            <div class="mt-6">
                <div class="relative flex items-center justify-center mb-6">
                    <div class="absolute inset-0 w-full border-t border-white/5"></div>
                    <span class="relative px-3 bg-[#050505] text-[10px] uppercase tracking-wider text-gray-500">Or integrate workspace</span>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <a class="flex items-center justify-center gap-2 py-2.5 border border-white/5 rounded-xl bg-white/5 text-xs text-white hover:bg-white/10 hover:border-white/10 transition-all" href="../meetwise_ai_dashboard/code.html">
                        <svg class="h-4 w-4" fill="currentColor" viewbox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
                        </svg>
                        Google
                    </a>
                    <a class="flex items-center justify-center gap-2 py-2.5 border border-white/5 rounded-xl bg-white/5 text-xs text-white hover:bg-white/10 hover:border-white/10 transition-all" href="../meetwise_ai_dashboard/code.html">
                        <svg class="h-4 w-4" fill="currentColor" viewbox="0 0 21 21">
                            <path d="M10 0H0v10h10V0zM21 0H11v10h10V0zM10 11H0v10h10V11zM21 11H11v10h10V11z" fill="#00a4ef"></path>
                        </svg>
                        Microsoft
                    </a>
                </div>
            </div>

            <p class="mt-8 text-center text-xs text-gray-500">
                New to MeetWise? 
                <a class="text-primary hover:underline font-semibold" href="../meetwise_ai_dashboard/code.html">Create Workspace</a>
            </p>
        </div>
    </div>

    <script>
        // Init Lucide
        lucide.createIcons();

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibility-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passwordInput.type = 'password';
                visibilityIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        function handleLoginSubmit(event) {
            event.preventDefault();
            // Perform basic cosmic login validation, and redirect to dashboard
            window.location.href = '../meetwise_ai_dashboard/code.html';
        }
    </script>
</body>
</html>
