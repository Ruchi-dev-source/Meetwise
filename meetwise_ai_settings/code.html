<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MeetWise AI - Workspace Settings</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#050505",
                        surface: "#0a0a0c",
                        "surface-card": "rgba(13, 13, 17, 0.45)",
                        primary: "#8B5CF6", // purple
                        secondary: "#3B82F6", // blue
                        accent: "#06B6D4", // cyan
                        pinky: "#EC4899", // pink
                        "on-background": "#F3F4F6",
                        "on-surface": "#E5E7EB",
                        outline: "rgba(255, 255, 255, 0.05)",
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        lg: "0.75rem",
                        xl: "1rem",
                        "2xl": "1.5rem",
                        full: "9999px"
                    },
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                        display: ["Space Grotesk", "sans-serif"],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050505;
            color: #F3F4F6;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .cosmic-grid {
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }
        .glass-card {
            background: rgba(13, 13, 17, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-card:hover {
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.15);
        }
        .glass-sidebar {
            background: rgba(10, 10, 12, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-header {
            background: rgba(5, 5, 5, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="min-h-screen relative flex antialiased">
    <!-- Cosmic visual layers -->
    <div class="absolute inset-0 cosmic-grid pointer-events-none z-0"></div>
    <div class="gradient-orb w-[500px] h-[500px] bg-primary top-[10%] left-[20%] opacity-10"></div>
    <div class="gradient-orb w-[600px] h-[600px] bg-pinky bottom-[10%] right-[10%] opacity-10"></div>

    <!-- Side Navigation Bar -->
    <aside class="glass-sidebar fixed left-0 top-0 h-full w-[250px] z-40 flex flex-col p-5 gap-6">
        <!-- Logo -->
        <a href="../meetwise_ai_features/code.html" class="flex items-center gap-2 px-2 cursor-pointer">
            <div class="w-8 h-8 rounded bg-gradient-to-tr from-primary to-pinky flex items-center justify-center">
                <i data-lucide="sparkles" class="text-white w-5 h-5"></i>
            </div>
            <div class="flex flex-col">
                <span class="font-display text-sm font-bold tracking-tight text-white">MeetWise AI</span>
                <span class="text-[9px] uppercase tracking-widest text-primary font-bold font-bold">Workspace</span>
            </div>
        </a>

        <!-- Create Button -->
        <button class="w-full bg-white text-black py-2.5 rounded-xl font-semibold text-xs hover:bg-primary hover:text-white transition-all duration-300 flex items-center justify-center gap-2 shadow-md hover:scale-[1.02]">
            <i data-lucide="plus" class="w-4 h-4"></i> Create Meeting
        </button>

        <!-- Navigation Tabs -->
        <nav class="flex-1 flex flex-col gap-1.5 overflow-y-auto">
            <a class="flex items-center gap-3 px-3.5 py-3 text-gray-400 hover:bg-white/5 hover:text-white rounded-xl transition-all" href="../meetwise_ai_dashboard/code.html">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                <span class="text-xs tracking-wide">Dashboard</span>
            </a>
            <a class="flex items-center gap-3 px-3.5 py-3 text-gray-400 hover:bg-white/5 hover:text-white rounded-xl transition-all" href="../meetwise_ai_meeting_details/code.html">
                <i data-lucide="video" class="w-4 h-4"></i>
                <span class="text-xs tracking-wide">Meetings</span>
            </a>
            <a class="flex items-center gap-3 px-3.5 py-3 text-gray-400 hover:bg-white/5 hover:text-white rounded-xl transition-all" href="../meetwise_ai_dashboard/code.html">
                <i data-lucide="check-square" class="w-4 h-4"></i>
                <span class="text-xs tracking-wide">Action Items</span>
            </a>
            <a class="flex items-center gap-3 px-3.5 py-3 text-gray-400 hover:bg-white/5 hover:text-white rounded-xl transition-all" href="../meetwise_ai_analytics_dashboard/code.html">
                <i data-lucide="bar-chart-3" class="w-4 h-4"></i>
                <span class="text-xs tracking-wide">Analytics</span>
            </a>
            <a class="flex items-center gap-3 px-3.5 py-3 bg-white/5 text-white font-semibold rounded-xl border border-white/5 transition-all" href="#">
                <i data-lucide="settings" class="w-4 h-4 text-primary"></i>
                <span class="text-xs tracking-wide">Settings</span>
            </a>
        </nav>

        <!-- Sidebar Footer -->
        <div class="mt-auto flex flex-col gap-1 pt-4 border-t border-white/5">
            <a class="flex items-center gap-3 px-3 py-2 text-gray-400 hover:text-white transition-colors text-xs" href="#">
                <i data-lucide="help-circle" class="w-4 h-4"></i> Support
            </a>
            <a class="flex items-center gap-3 px-3 py-2 text-gray-400 hover:text-white transition-colors text-xs" href="../meetwise_ai_login/code.html">
                <i data-lucide="log-out" class="w-4 h-4"></i> Sign Out
            </a>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 md:ml-[250px] min-h-screen flex flex-col relative z-10">
        <!-- Settings Sub-Navigation & Panel Layout -->
        <div class="flex-grow max-w-5xl mx-auto w-full p-8 flex flex-col md:flex-row gap-8">
            <!-- Settings Categories sub-nav sidebar (Spans 3 cols roughly) -->
            <aside class="w-full md:w-56 shrink-0 flex flex-col gap-2">
                <h2 class="font-display text-xl font-bold text-white mb-4">Settings</h2>
                <nav class="flex md:flex-col gap-1 overflow-x-auto md:overflow-visible pb-3 md:pb-0">
                    <button class="flex items-center gap-3 px-4 py-2.5 bg-white/5 text-white font-semibold border border-white/5 rounded-xl text-xs transition-colors shrink-0">
                        <i data-lucide="building" class="w-4 h-4 text-primary"></i> Workspace
                    </button>
                    <button class="flex items-center gap-3 px-4 py-2.5 text-gray-400 hover:text-white hover:bg-white/5 rounded-xl text-xs transition-colors shrink-0">
                        <i data-lucide="cpu" class="w-4 h-4"></i> AI Preferences
                    </button>
                    <button class="flex items-center gap-3 px-4 py-2.5 text-gray-400 hover:text-white hover:bg-white/5 rounded-xl text-xs transition-colors shrink-0">
                        <i data-lucide="bell" class="w-4 h-4"></i> Notifications
                    </button>
                    <button class="flex items-center gap-3 px-4 py-2.5 text-gray-400 hover:text-white hover:bg-white/5 rounded-xl text-xs transition-colors shrink-0">
                        <i data-lucide="shield" class="w-4 h-4"></i> Security
                    </button>
                    <button class="flex items-center gap-3 px-4 py-2.5 text-gray-400 hover:text-white hover:bg-white/5 rounded-xl text-xs transition-colors shrink-0">
                        <i data-lucide="credit-card" class="w-4 h-4"></i> Billing
                    </button>
                </nav>
            </aside>

            <!-- Active Settings Panel -->
            <div class="flex-1 flex flex-col gap-6 max-w-2xl">
                <!-- Workspace Settings Card -->
                <section class="glass-card rounded-2xl p-6 md:p-8 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-48 h-48 bg-primary/5 rounded-full blur-2xl pointer-events-none"></div>
                    <div class="mb-6">
                        <h3 class="font-display text-lg font-bold text-white mb-1">Workspace Profile</h3>
                        <p class="text-xs text-gray-400">Configure parameters for your team workspace.</p>
                    </div>

                    <div class="space-y-6 relative z-10">
                        <!-- Logo upload widget -->
                        <div class="flex items-center gap-6">
                            <div class="w-16 h-16 rounded-xl bg-white/5 border border-dashed border-white/10 hover:border-primary/50 transition-colors flex flex-col items-center justify-center text-gray-500 hover:text-primary cursor-pointer overflow-hidden relative group">
                                <img class="absolute inset-0 w-full h-full object-cover opacity-50 group-hover:scale-105 transition-transform" alt="Workspace logo preview" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBHM0L03e6mrfakk9WgyrpPjKzJTfa-TRyMmg9oyuTNatMhuQMjJJgZPryADCpqRJgR2q00L3r8wWZoUG_CNfnLiYsrKUV1O7mQQLo6dWV-nHrW-lut7FEs_nkPJwUtKA9uIo7Uib9glcQKAytmrJ4dVYZserIkPdiCZ3CfeL6-AXzjOMoRAYqfsoObR5EaxFjQdKyMNl88Q9jb49Y9mI_XOtb_fjQACA_TDfdcdW36VLbCTvFGZxrUSPf57nEfjZ1JEJYNKOvklcM"/>
                                <i data-lucide="upload" class="w-5 h-5 text-white z-10 relative"></i>
                            </div>
                            <div>
                                <p class="text-xs font-semibold text-white">Workspace Logo</p>
                                <p class="text-[10px] text-gray-500">Suggested dimension: 256x256px (PNG, SVG)</p>
                                <button class="mt-1 text-[10px] text-primary hover:underline font-bold">Remove workspace logo</button>
                            </div>
                        </div>

                        <!-- Workspace Name Input -->
                        <div class="space-y-2">
                            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400" for="workspace-name">Workspace Identifier</label>
                            <input class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-inner" id="workspace-name" placeholder="Workspace name" type="text" value="Acme Corp Engineering"/>
                        </div>

                        <!-- Workspace Slug URL -->
                        <div class="space-y-2">
                            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400" for="workspace-url">Workspace Access Route</label>
                            <div class="flex">
                                <span class="inline-flex items-center px-4 rounded-l-xl border border-r-0 border-white/5 bg-white/5 text-gray-400 text-xs font-medium">
                                    meetwise.ai/w/
                                </span>
                                <input class="flex-1 bg-white/5 border border-white/5 rounded-r-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-inner" id="workspace-url" placeholder="slug" type="text" value="acme-eng"/>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Actions Save -->
                <div class="flex justify-end gap-3">
                    <button class="px-5 py-2.5 text-xs font-semibold text-gray-400 bg-white/5 border border-white/5 rounded-xl hover:bg-white/10 hover:text-white transition-colors" onclick="window.location.href='../meetwise_ai_dashboard/code.html'">
                        Cancel
                    </button>
                    <button class="px-5 py-2.5 text-xs font-semibold text-black bg-white rounded-xl hover:bg-primary hover:text-white transition-all shadow-md hover:scale-[1.02]">
                        Save Changes
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Init Lucide
        lucide.createIcons();
    </script>
</body>
</html>
